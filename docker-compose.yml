# Local development compose — mirrors docker-compose.yaml without Traefik labels.
# For production, use docker-compose.yaml (deployed via Coolify).
version: '3.8'
services:
  openmanus-backend:
    image: 'ghcr.io/u2giants/openmanus:main'
    restart: unless-stopped
    entrypoint: ["./entrypoint.sh"]
    environment:
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'DAYTONA_API_KEY=${DAYTONA_API_KEY}'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}'
      - 'OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://openrouter.ai/api/v1}'
      - 'BROWSER_CDP_URL=http://novnc:9223'
    ports:
      - '8001:8000'
    depends_on:
      - novnc
  open-webui:
    image: 'ghcr.io/open-webui/open-webui:main'
    restart: unless-stopped
    environment:
      - 'OPENAI_API_BASE_URL=http://openmanus-backend:8000/v1'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - ENABLE_TERMINAL=true
    ports:
      - '3000:8080'
    depends_on:
      - openmanus-backend
    volumes:
      - 'open-webui-data:/app/backend/data'
  novnc:
    image: lscr.io/linuxserver/webtop:ubuntu-mate
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SUBFOLDER=/
      - DOCKER_MODS=linuxserver/mods:universal-package-install
      - INSTALL_PACKAGES=chromium-browser
    volumes:
      - novnc-data:/config
      - ./novnc-startup.sh:/custom-cont-init.d/99-start-chromium.sh:ro
    shm_size: '1gb'
    expose:
      - "9222"
    ports:
      - '6080:3000'
volumes:
  open-webui-data: null
  novnc-data: null
