# OpenManus runtime configuration
# Env vars are substituted by entrypoint.sh at container startup

[llm]
model = "__OPENAI_MODEL__"
base_url = "__OPENAI_API_BASE_URL__"
api_key = "__OPENAI_API_KEY__"
max_tokens = 4096
temperature = 0.0

[daytona]
daytona_api_key = "__DAYTONA_API_KEY__"

[browser]
headless = false
disable_security = true
cdp_url = "__BROWSER_CDP_URL__"

[mcp]
server_reference = "fidelity_mcp.server"
