name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.txt'
      - 'cdp_proxy.py'
      - 'novnc-startup.sh'
      - '.github/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  SMOKE_BASE_URL: https://manus.designflow.app

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.filter.outputs.image }}
      compose: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            image:
              - '**'
              - '!docker-compose.yaml'
              - '!cdp_proxy.py'
              - '!novnc-startup.sh'
              - '!.github/**'
              - '!**/*.md'
              - '!**/*.txt'
            compose:
              - 'docker-compose.yaml'

  # Full build + deploy when image source files change.
  build-and-deploy:
    needs: detect-changes
    if: needs.detect-changes.outputs.image == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Sync compose to Coolify DB
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          COMPOSE=$(base64 -w 0 docker-compose.yaml)
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"docker_compose_raw\": \"$COMPOSE\"}" \
            "http://178.156.180.212:8000/api/v1/services/e10kwzww46ljhrgz1qj08j6a")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Coolify sync response: $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Compose sync failed with HTTP $status"
            exit 1
          fi
          echo "Compose synced to Coolify DB (HTTP $status)"

      - name: Deploy via Coolify webhook
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            "http://178.156.180.212:8000/api/v1/deploy?uuid=e10kwzww46ljhrgz1qj08j6a&force=true")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Coolify response: $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Deploy failed with HTTP $status"
            exit 1
          fi
          echo "Deploy triggered successfully (HTTP $status)"

  # Compose-only change: sync to Coolify DB without triggering a deploy.
  # The updated compose takes effect on the next image-triggered deploy.
  sync-compose:
    needs: detect-changes
    if: needs.detect-changes.outputs.compose == 'true' && needs.detect-changes.outputs.image != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync compose to Coolify DB (no deploy)
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
        run: |
          COMPOSE=$(base64 -w 0 docker-compose.yaml)
          response=$(curl -s -w "\n%{http_code}" -X PATCH \
            -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"docker_compose_raw\": \"$COMPOSE\"}" \
            "http://178.156.180.212:8000/api/v1/services/e10kwzww46ljhrgz1qj08j6a")
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Coolify sync response: $body"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Compose sync failed with HTTP $status"
            exit 1
          fi
          echo "Compose synced to Coolify DB — takes effect on next deploy (HTTP $status)"

  # Post-deploy smoke check. Only runs when a real deploy happened.
  smoke-check:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Coolify deployment to settle
        run: |
          echo "Polling until OpenWebUI reports healthy (max 5 min)..."
          deadline=$((SECONDS + 300))
          until curl -sf --max-time 10 "${SMOKE_BASE_URL}/" > /dev/null 2>&1; do
            if [ $SECONDS -ge $deadline ]; then
              echo "Timed out waiting for service to come up"
              exit 1
            fi
            echo "Not ready yet, retrying in 15s..."
            sleep 15
          done
          echo "Service is up, proceeding to smoke checks."

      - name: Smoke check critical routes
        run: |
          PATHS=("/admin/tools" "/api/tools" "/")
          MAX_RETRIES=8
          RETRY_DELAY=20
          FAILED=0

          for path in "${PATHS[@]}"; do
            url="${SMOKE_BASE_URL}${path}"
            success=0
            for i in $(seq 1 $MAX_RETRIES); do
              status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null || echo "000")
              if [[ "$status" =~ ^2 ]]; then
                echo "✅ $url → HTTP $status (attempt $i/$MAX_RETRIES)"
                success=1
                break
              else
                echo "❌ $url → HTTP $status (attempt $i/$MAX_RETRIES), retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              fi
            done
            if [ $success -eq 0 ]; then
              echo "FAILED: $url did not return 2xx after $MAX_RETRIES attempts"
              FAILED=1
            fi
          done

          if [ $FAILED -ne 0 ]; then
            echo "::error::Smoke check failed — one or more routes returned non-2xx. Possible stale proxy config or deployment issue."
            exit 1
          fi

          echo "All smoke checks passed ✅"
