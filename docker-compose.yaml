version: '3.8'
services:
  openmanus-backend:
    image: 'ghcr.io/u2giants/openmanus:main'
    pull_policy: always
    restart: unless-stopped
    entrypoint: ["./entrypoint.sh"]
    environment:
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - 'DAYTONA_API_KEY=${DAYTONA_API_KEY}'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}'
      - 'OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL:-https://openrouter.ai/api/v1}'
      - 'BROWSER_CDP_URL=http://novnc:9223'
    ports:
      - '8001:8000'
    volumes:
      - /data/coolify/openmanus/user_tools:/app/user_tools
      - /mnt/tailscale/souls:/app/custom_souls
    depends_on:
      - novnc
    labels:
      - traefik.enable=true
      - "traefik.http.routers.openmanus-admin.rule=Host(`manus.designflow.app`) && (PathPrefix(`/admin/`) || PathPrefix(`/api/tools`) || PathPrefix(`/api/owui`))"
      - traefik.http.routers.openmanus-admin.entrypoints=https
      - traefik.http.routers.openmanus-admin.tls=true
      - traefik.http.routers.openmanus-admin.tls.certresolver=letsencrypt
      - traefik.http.services.openmanus-admin.loadbalancer.server.port=8000

  open-webui:
    image: 'ghcr.io/open-webui/open-webui:main'
    pull_policy: always
    restart: unless-stopped
    environment:
      - 'OPENAI_API_BASE_URL=http://openmanus-backend:8000/v1'
      - 'OPENROUTER_API_KEY=${OPENROUTER_API_KEY}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY}'
      - ENABLE_TERMINAL=true
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_PROVIDER_NAME=Google
      - 'GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}'
      - 'GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}'
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - WEBUI_URL=https://manus.designflow.app
      - OPENID_PROVIDER_URL=https://accounts.google.com/.well-known/openid-configuration
      - 'WEBUI_BANNERS=[{"id":"tool-manager","type":"info","title":"","content":"[Open Tool Manager](/admin/tools) — Create and edit OpenManus Python tools","dismissible":true,"timestamp":1713010000}]'
    ports:
      - '3000:8080'
    volumes:
      - 'open-webui-data:/app/backend/data'
    depends_on:
      - openmanus-backend
    labels:
      - traefik.enable=true
      - traefik.http.routers.open-webui.rule=Host(`manus.designflow.app`)
      - traefik.http.routers.open-webui.entrypoints=https
      - traefik.http.routers.open-webui.tls=true
      - traefik.http.routers.open-webui.tls.certresolver=letsencrypt
      - traefik.http.services.open-webui.loadbalancer.server.port=8080
      - traefik.http.routers.open-webui-http.rule=Host(`manus.designflow.app`)
      - traefik.http.routers.open-webui-http.entrypoints=http
      - traefik.http.routers.open-webui-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https

  novnc:
    image: lscr.io/linuxserver/webtop:ubuntu-mate
    pull_policy: always
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SUBFOLDER=/
      - DOCKER_MODS=linuxserver/mods:universal-package-install
      - INSTALL_PACKAGES=chromium-browser
    volumes:
      - novnc-data:/config
      - ./novnc-startup.sh:/custom-cont-init.d/99-start-chromium.sh:ro
      - ./cdp_proxy.py:/custom-cont-init.d/cdp_proxy.py:ro
    shm_size: '1gb'
    expose:
      - "9222"
    labels:
      - traefik.enable=true
      - traefik.http.routers.novnc.rule=Host(`vnc.designflow.app`)
      - traefik.http.routers.novnc.entrypoints=https
      - traefik.http.routers.novnc.tls=true
      - traefik.http.routers.novnc.tls.certresolver=letsencrypt
      - traefik.http.services.novnc.loadbalancer.server.port=3000
      - traefik.http.routers.novnc-http.rule=Host(`vnc.designflow.app`)
      - traefik.http.routers.novnc-http.entrypoints=http
      - traefik.http.routers.novnc-http.middlewares=redirect-to-https

volumes:
  open-webui-data:
  novnc-data:
